const LUCK_KEYS = ["肉運","麺運","甘味運","揚げ運"];

function jstDateStr(){
  const now = new Date(Date.now() + (9*60 + new Date().getTimezoneOffset())*60000);
  const y=now.getFullYear(), m=now.getMonth()+1, d=now.getDate();
  const youbi="日月火水木金土"[now.getDay()];
  return {seed:`${y}-${m}-${d}`, disp:`${y}年${m}月${d}日（${youbi}）`};
}
function pickWeighted(rnd, arr){
  const total = arr.reduce((s,a)=>s+a.w,0);
  let r = rnd()*total;
  for(const a of arr){ if((r-=a.w)<0) return a.n; }
  return arr[arr.length-1].n;
}
function hearts(n){
  let s="";
  for(let i=0;i<5;i++) s += i<n ? "♥" : '<span class="off">♥</span>';
  return s;
}
function heartsPlain(n){ return "💗".repeat(n)+"🤍".repeat(5-n); }
// Xの加重カウント（ASCII等=1、全角・絵文字=2、URLは呼び出し側で23換算）
function tweetWeight(text){
  let w = 0;
  for(const ch of text.replace(/https?:\/\/\S+/g, "")){
    const c = ch.codePointAt(0);
    w += (c <= 0x10FF || (c >= 0x2000 && c <= 0x200D) || (c >= 0x2010 && c <= 0x201F)) ? 1 : 2;
  }
  if(/https?:\/\/\S+/.test(text)) w += 23;
  return w;
}

function divine(name){
  const rnd = mulberry32(xmur3(name + "|" + dateSeed)());
  let rank = pickWeighted(rnd, RANKS);
  // 1%の隠し激レア（別シードで判定するので、他の抽選結果には影響しない）
  const rare = xmur3(name + "|" + dateSeed + "|rare")() % 100 === 0;
  if(rare) rank = "神盛吉☆";
  const [kanji,yomi,menus] = KANJI[Math.floor(rnd()*KANJI.length)];
  const lucks = LUCK_KEYS.map(k=>({k, v: 1+Math.floor(rnd()*5)}));
  const menu = menus[Math.floor(rnd()*menus.length)];
  const spice = SPICES[Math.floor(rnd()*SPICES.length)];
  const words = WORDS[rank];
  const word  = words[Math.floor(rnd()*words.length)];
  return {rank,rare,kanji,yomi,lucks,menu,spice,word};
}

function divinePair(a,b){
  const [n1,n2] = [a,b].sort(); // 入れる順番が違っても同じ結果になる
  const rnd = mulberry32(xmur3(n1 + "&" + n2 + "|" + dateSeed + "|pair")());
  let t = PAIR_TIERS[PAIR_TIERS.length-1], rr = rnd()*100;
  for(const tier of PAIR_TIERS){ if((rr-=tier.w)<0){ t=tier; break; } }
  const pct = t.min + Math.floor(rnd()*(t.max-t.min+1));
  const [kanji,yomi,menus] = KANJI[Math.floor(rnd()*KANJI.length)];
  const menu = menus[Math.floor(rnd()*menus.length)];
  const ws = PAIR_WORDS.find(([min])=>pct>=min)[1];
  const word = ws[Math.floor(rnd()*ws.length)];
  return {pct,kanji,yomi,menu,word,n1,n2};
}

/* ===== 結果カードの画像化 ===== */
function rrPath(ctx,x,y,w,h,r){
  if(ctx.roundRect){ ctx.beginPath(); ctx.roundRect(x,y,w,h,r); return; }
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function wrapJa(ctx,text,maxW){
  const lines=[]; let line="";
  for(const ch of text){
    if(line && ctx.measureText(line+ch).width>maxW){ lines.push(line); line=ch; }
    else line+=ch;
  }
  if(line) lines.push(line);
  return lines;
}

    ctx.fillStyle="#8A5A44"; ctx.fillText(val,bx+bw/2,y+76);
  });
  y+=bh+24;
  // ひとこと
  ctx.font="500 28px 'Zen Maru Gothic'";
  const kx=ix+32, kw=iw-64;
  const lines=wrapJa(ctx,r.word,kw-76).slice(0,3);
  const kh=lines.length*42+38;
  ctx.fillStyle="rgba(255,255,255,.9)"; rrPath(ctx,kx,y,kw,kh,22); ctx.fill();
  ctx.strokeStyle="#FF6FB5"; ctx.lineWidth=3; ctx.lineCap="round"; ctx.setLineDash([2,10]);
  rrPath(ctx,kx,y,kw,kh,22); ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle="#7a5a6a";
  lines.forEach((ln,i)=>ctx.fillText(ln,cx,y+38+i*42));
  y+=kh+34;
  // フッター（日付＋クレジット）
  ctx.fillStyle="#d49ab8"; ctx.font="700 22px 'Zen Maru Gothic'";
  ctx.fillText(dateDisp+"  — KUISHINBO MIKUJI —",cx,Math.min(y,iy+ih-40));
  return cv;
}
function canvasToBlob(cv){ return new Promise(res=>cv.toBlob(res,"image/png")); }
const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent)
  || (navigator.maxTouchPoints>1 && /Mac/.test(navigator.userAgent));

document.getElementById("shareX").addEventListener("click", async ()=>{
  if(!lastResult) return;
  // スマホ：共有シートで画像つきシェア（Xアプリを選べば画像が添付される）
  if(isMobile && navigator.canShare){
    try{
      const blob = await canvasToBlob(await makeResultImage());
      const file = new File([blob], "kuishinbo-mikuji.png", {type:"image/png"});
      if(navigator.canShare({files:[file]})){
        await navigator.share({files:[file], text:lastShare});
        return;
      }
    }catch(err){
      if(err && err.name==="AbortError") return; // ユーザーがキャンセル
      // 失敗したらテキストシェアにフォールバック
    }
  }
  // PCなど：従来のテキスト＋URLシェア
  const url = "https://twitter.com/intent/tweet?text=" + encodeURIComponent(lastShare);
  window.open(url, "_blank");
});

document.getElementById("shareSave").addEventListener("click", async (e)=>{
  if(!lastResult) return;
  try{
    const blob = await canvasToBlob(await makeResultImage());
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "kuishinbo-mikuji_" + dateSeed + ".png";
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href), 4000);
    e.target.textContent = "ほぞんした〜☆";
    setTimeout(()=>{ e.target.textContent = "結果を画像でほぞんする📸"; }, 1600);
  }catch(_){
    e.target.textContent = "ごめん、失敗しちゃった…";
    setTimeout(()=>{ e.target.textContent = "結果を画像でほぞんする📸"; }, 1600);
  }
});
